server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/cd_web
    username: root
    password: 12345
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # ── Redis ──
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 5000ms

  # ── Mail (Đã cập nhật theo bản mới) ──
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:your-email@gmail.com}
    password: ${MAIL_PASSWORD:your-app-password}
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # ── Scheduling (F3 – dọn QR token hết hạn) ──
  task:
    scheduling:
      enabled: true

  # ── Async (F8 – gửi email bất đồng bộ) ──
  async:
    enabled: true

# ── JWT (Đã bổ sung refresh token) ──
jwt:
  secret: ${JWT_SECRET:your_secret_key_here_change_this_to_a_long_random_string_at_least_64_chars}
  expiration: 86400000         # 24 giờ (ms)
  refresh-expiration: 604800000 # 7 ngày (ms)

# ── Google OAuth2 (Từ bản cũ) ──
google:
  client:
    id: 573198951854-46toem8hgic9va247hthtaem89f3alr7.apps.googleusercontent.com

# ── VNPAY (F5 - Thanh toán) ──
vnpay:
  tmnCode: ${VNPAY_TMN_CODE:B4JPTDZH}
  hashSecret: ${VNPAY_HASH_SECRET:JLWFEXD3QGN4QOOW2W1I9XZITI6C3V8D}
  payUrl: https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
  returnUrl: ${APP_BACKEND_URL:http://localhost:8080}/api/payment/vnpay/return

# ── GHN (F5 - Giao hàng nhanh) ──
ghn:
  token: ${GHN_TOKEN:57fb4bcb-2ed0-11f0-9058-46b90fbc47f5}
  shopId: ${GHN_SHOP_ID:5772189}
  baseUrl: https://dev-online-gateway.ghn.vn/shiip/public-api  # Dùng môi trường dev

# ── App Settings (Gộp cả cũ và mới để tránh lỗi code) ──
app:
  frontend-url: ${APP_FRONTEND_URL:http://localhost:3000}
  backend-url: ${APP_BACKEND_URL:http://localhost:8080}
  password-reset-expiry: 3600000  # Dùng cho code mới (ms)
  password-reset:
    frontend-url: ${APP_FRONTEND_URL:http://localhost:3000}/reset-password
    expiration-minutes: 60 # Dùng cho code cũ

# ── Spring Boot Actuator (Từ bản cũ) ──
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus,info
  endpoint:
    health:
      show-details: always