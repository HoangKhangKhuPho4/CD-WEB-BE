server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/cdweb_db
    username: root
    password: 
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: your_secret_key_here
  expiration: 86400000 # 24 hours
