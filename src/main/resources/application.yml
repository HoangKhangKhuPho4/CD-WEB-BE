server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/cd_web
    username: root
    password: 
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # Redis — set enabled=false to skip Redis if not installed
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 5000ms

  # Mail — SMTP configuration (Gmail example)
  mail:
    host: smtp.gmail.com
    port: 587
    username: your-email@gmail.com
    password: your-app-password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

jwt:
  secret: your_secret_key_here_change_this_to_a_long_random_string_at_least_64_chars
  expiration: 86400000 # 24 hours

# Google OAuth2
google:
  client:
    id: your-google-client-id.apps.googleusercontent.com

# App settings
app:
  server:
    url: http://localhost:8080
  password-reset:
    frontend-url: http://localhost:3000/reset-password
    expiration-minutes: 60

# Bước 4: Spring Boot Actuator — Health, Metrics, Monitoring
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus,info
  endpoint:
    health:
      show-details: always
