server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/cd_web
    username: root

    password: ""
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # ── Redis ──
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 5000ms

  # ── Mail (Đã cập nhật theo bản mới) ──
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:phamthaibao57@gmail.com}
    password: ${MAIL_PASSWORD:ggkk msle usqo eaxt}
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # ── Scheduling (F3 – dọn QR token hết hạn) ──
  task:
    scheduling:
      enabled: true

  # ── Async (F8 – gửi email bất đồng bộ) ──
  async:
    enabled: true

# ── JWT (Đã bổ sung refresh token) ──
jwt:
  secret: ${JWT_SECRET:your_secret_key_here_change_this_to_a_long_random_string_at_least_64_chars}
  expiration: 86400000         # 24 giờ (ms)
  refresh-expiration: 604800000 # 7 ngày (ms)

# ── Google OAuth2 (Cấu Hình Chuyên Đề Web) ──
# FE phải dùng cùng Client ID (NEXT_PUBLIC_GOOGLE_CLIENT_ID) để idToken verify khớp BE.
google:
  client:
    id: ${GOOGLE_CLIENT_ID:91702937442-68dtl399821hm38ur4pnnsqmuhrj555i.apps.googleusercontent.com}
    secret: ${GOOGLE_CLIENT_SECRET:}

